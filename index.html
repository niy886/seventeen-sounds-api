<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#F9F7F2">
  <meta name="description" content="十七音 - 俳句を詠み、共有する美学的なアプリ。五・七・十七音で自然の美しさを詠みます。">
  <meta property="og:title" content="十七音 - Haiku">
  <meta property="og:description" content="俳句を詠み、共有する美学的なアプリ">
  <meta property="og:type" content="website">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="十七音">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>十七音 - Haiku</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      height: 100%;
      background: #F9F7F2;
      font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      --primary: #1A1A1A;
      --secondary: #6B6B6B;
      --accent: #C41E3A;
      --bg: #F9F7F2;
      --card: #FFFFFF;
      --border: #E8E5E0;
    }
    
    .app { max-width: 420px; margin: 0 auto; min-height: 100vh; background: var(--bg); position: relative; }
    
    /* Login */
    .login-screen { display: flex; flex-direction: column; min-height: 100vh; padding: 80px 32px 40px; justify-content: center; }
    .login-logo { font-family: 'Noto Serif JP', serif; font-size: 36px; color: var(--primary); text-align: center; letter-spacing: 0.3em; margin-bottom: 8px; }
    .login-subtitle { font-size: 13px; color: var(--secondary); text-align: center; margin-bottom: 48px; letter-spacing: 0.1em; }
    .login-input { width: 100%; padding: 16px; background: transparent; border: none; border-bottom: 1px solid var(--border); font-size: 16px; margin-bottom: 24px; text-align: center; font-family: 'Noto Serif JP', serif; }
    .login-input:focus { outline: none; border-color: var(--primary); }
    .login-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; font-size: 14px; letter-spacing: 0.2em; cursor: pointer; }
    .login-divider { display: flex; align-items: center; margin: 32px 0; }
    .login-divider::before, .login-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .login-divider span { padding: 0 16px; font-size: 12px; color: var(--secondary); }
    .login-social { display: flex; justify-content: center; gap: 24px; }
    .login-social-btn { width: 48px; height: 48px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s ease; }
    .login-social-btn:active { background: var(--primary); color: white; border-color: var(--primary); }
    
    /* Splash */
    .splash { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; }
    .splash-title { font-family: 'Noto Serif JP', serif; font-size: 42px; color: var(--primary); letter-spacing: 0.4em; }
    .splash-haiku { font-family: 'Noto Serif JP', serif; font-size: 15px; color: var(--secondary); text-align: center; line-height: 2.4; margin-top: 24px; }
    
    /* Header */
    .header { padding: 24px 24px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
    .header-title { font-family: 'Noto Serif JP', serif; font-size: 20px; color: var(--primary); letter-spacing: 0.15em; }
    .header-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #2D2D2D, #5A5A5A); display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; }
    .header-large { padding: 24px; background: var(--bg); }
    .header-large-title { font-family: 'Noto Serif JP', serif; font-size: 28px; color: var(--primary); letter-spacing: 0.1em; }
    
    .header-points { font-size: 13px; color: var(--secondary); display: flex; align-items: center; gap: 4px; }
    .points-badge { background: var(--primary); color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; }
    
    /* Content */
    .content { padding: 80px 24px 120px; }
    
    /* Toast 提示组件样式 */
    .toast-container {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 99999;
      pointer-events: none;
    }
    
    .toast {
      background: rgba(0, 0, 0, 0.8);
      color: white;
      padding: 12px 24px;
      border-radius: 24px;
      font-size: 14px;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      white-space: nowrap;
    }
    
    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
    
    .toast.hide {
      opacity: 0;
      transform: translateY(20px);
    }
    
    /* 简约加载动画 */
    .loading-mini {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 6px;
      padding: 12px;
    }
    
    .loading-mini-dot {
      width: 4px;
      height: 4px;
      background: var(--secondary);
      border-radius: 50%;
      animation: pulse 1.4s infinite ease-in-out both;
    }
    
    .loading-mini-dot:nth-child(1) { animation-delay: -0.32s; }
    .loading-mini-dot:nth-child(2) { animation-delay: -0.16s; }
    .loading-mini-dot:nth-child(3) { animation-delay: 0s; }
    
    @keyframes pulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
    
    /* 页面切换动画 */
    .tab-page {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }
    
    .tab-page.active {
      opacity: 1;
      visibility: visible;
    }
    
    .tab-page.exit {
      opacity: 0;
    }
    
    /* 页面淡入动画 */
    .page-fade-in {
      animation: pageFadeIn 0.3s ease forwards;
    }
    
    @keyframes pageFadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    /* Tab Content - 修复遮挡问题 */
    .tab-content { 
      position: relative;
      z-index: 1;
      min-height: 100vh;
      background: var(--bg);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    /* Tab */
    .tab-bar { position: fixed; top: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 420px; background: var(--bg); border-bottom: 1px solid var(--border); display: flex; justify-content: space-around; padding: 16px 0; z-index: 9999; }
    .tab-item { display: flex; flex-direction: column; align-items: center; flex: 1; }
    .tab-icon { font-size: 20px; margin-bottom: 4px; opacity: 0.4; }
    .tab-item.active .tab-icon { opacity: 1; }
    .tab-label { font-size: 10px; color: var(--secondary); letter-spacing: 0.1em; font-family: 'Noto Serif JP', serif; }
    .tab-item.active .tab-label { color: var(--primary); }
    
    /* Input */
    .create-input { width: 100%; min-height: 80px; padding: 16px; background: var(--card); border: 1px solid var(--border); font-size: 16px; font-family: 'Noto Serif JP', serif; resize: none; margin-bottom: 20px; }
    
    /* Kigo */
    .kigo-section { margin-bottom: 24px; }
    .kigo-label { font-size: 11px; color: var(--secondary); margin-bottom: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
    .kigo-pills { display: flex; flex-wrap: wrap; gap: 8px; }
    .kigo-pill { padding: 8px 16px; background: var(--card); border: 1px solid var(--border); font-size: 14px; }
    .kigo-pill:active { background: var(--primary); color: white; }
    
    /* Button */
    .action-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; font-size: 13px; letter-spacing: 0.15em; }
    .action-btn:disabled { opacity: 0.5; }
    .action-btn-secondary { background: transparent; color: var(--primary); border: 1px solid var(--border); }
    
    /* Haiku Card */
    .haiku-card { background: var(--card); padding: 32px 24px; text-align: center; margin-bottom: 16px; border: 1px solid var(--border); }
    .haiku-season { font-size: 11px; color: var(--secondary); letter-spacing: 0.15em; margin-bottom: 16px; text-transform: uppercase; }
    .haiku-lines { font-family: 'Noto Serif JP', serif; font-size: 20px; line-height: 2.2; color: var(--primary); letter-spacing: 0.1em; }
    .haiku-author { font-size: 12px; color: var(--secondary); margin-top: 20px; }
    .haiku-actions { display: flex; justify-content: center; gap: 32px; margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border); }
    .haiku-action { font-size: 13px; color: var(--secondary); }
    .haiku-action.liked { color: var(--accent); }
    
    .haiku-user { display: flex; align-items: center; margin-bottom: 16px; }
    .haiku-user-avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, #2D2D2D, #5A5A5A); display: flex; align-items: center; justify-content: center; color: white; font-size: 12px; margin-right: 12px; }
    .haiku-user-info { flex: 1; }
    .haiku-user-name { font-size: 14px; font-weight: 500; }
    .haiku-user-time { font-size: 12px; color: var(--secondary); }
    .haiku-user-follow { font-size: 11px; color: var(--secondary); cursor: pointer; padding: 4px 8px; border: 1px solid var(--border); border-radius: 4px; }
    .haiku-user-follow.following { background: var(--primary); color: white; border-color: var(--primary); }
    
    /* Discover */
    .discover-tabs { display: flex; gap: 8px; justify-content: center; padding: 12px 16px; background: var(--card); border-top: 1px solid var(--border); position: fixed; bottom: 70px; left: 0; right: 0; max-width: 420px; margin: 0 auto; }
    .discover-tab { padding: 8px 20px; background: transparent; border: 1px solid var(--border); font-size: 12px; color: var(--secondary); border-radius: 20px; }
    .discover-tab.active { background: var(--primary); color: white; border-color: var(--primary); }
    
    /* Profile */
    .profile-header { text-align: center; padding: 32px 0; }
    .profile-avatar { width: 72px; height: 72px; border-radius: 50%; background: linear-gradient(135deg, #2D2D2D, #5A5A5A); margin: 0 auto 16px; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; }
    .profile-name { font-size: 18px; font-weight: 500; margin-bottom: 4px; }
    .profile-email { font-size: 13px; color: var(--secondary); margin-bottom: 20px; }
    .profile-stats { display: flex; justify-content: center; gap: 32px; }
    .profile-stat-num { font-size: 18px; font-weight: 500; }
    .profile-stat-label { font-size: 11px; color: var(--secondary); margin-top: 4px; }
    
    .menu-item { padding: 16px 0; border-bottom: 1px solid var(--border); font-size: 14px; display: flex; justify-content: space-between; }
    .menu-item:last-child { border-bottom: none; }
    .menu-item-arrow { color: var(--secondary); }
    .menu-item-danger { color: var(--accent); }
    
    /* Timeline */
    .timeline-month { margin-bottom: 32px; }
    .timeline-month-title { font-size: 12px; color: var(--secondary); margin-bottom: 16px; letter-spacing: 0.1em; }
    .timeline-item { display: flex; margin-bottom: 20px; }
    .timeline-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); margin-top: 6px; margin-right: 16px; flex-shrink: 0; }
    .timeline-content { flex: 1; }
    .timeline-date { font-size: 11px; color: var(--secondary); margin-top: 8px; }
    
    /* Loading */
    .loading { display: flex; justify-content: center; padding: 20px; }
    .loading-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; margin: 0 4px; animation: bounce 1.4s infinite ease-in-out both; }
    .loading-dot:nth-child(1) { animation-delay: -0.32s; }
    .loading-dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-icon { font-size: 24px; margin-bottom: 16px; opacity: 0.2; color: var(--primary); }
    .empty-text { font-size: 14px; color: var(--secondary); letter-spacing: 0.05em; }
    
    /* Comments */
    .comment-section { margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }
    .comment-input-wrap { display: flex; gap: 8px; margin-bottom: 12px; }
    .comment-input { flex: 1; padding: 10px 12px; background: var(--bg); border: 1px solid var(--border); font-size: 13px; }
    .comment-input:focus { outline: none; border-color: var(--primary); }
    .comment-btn { padding: 10px 16px; background: var(--primary); color: white; border: none; font-size: 12px; }
    .comment-list { margin-top: 12px; }
    .comment-item { display: flex; gap: 8px; margin-bottom: 12px; }
    .comment-avatar { width: 24px; height: 24px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0; }
    .comment-content { flex: 1; }
    .comment-user { font-size: 12px; font-weight: 500; }
    .comment-text { font-size: 13px; color: var(--secondary); margin-top: 2px; }
    .comment-time { font-size: 10px; color: var(--secondary); margin-top: 4px; }
    
    /* Pull to Refresh */
    .pull-refresh { position: relative; overflow: hidden; }
    .pull-indicator { position: absolute; top: 0; left: 0; right: 0; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 12px; color: var(--secondary); background: var(--bg); z-index: 100; transition: transform 0.3s; transform: translateY(-60px); }
    .pull-indicator.active { transform: translateY(0); }
    .pull-indicator.loading { color: var(--primary); }
    .pull-indicator .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* Share */
    .share-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99999; display: flex; align-items: flex-end; }
    .share-modal { background: var(--bg); width: 100%; max-width: 420px; margin: 0 auto; border-radius: 16px 16px 0 0; padding: 24px; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .share-title { font-size: 16px; text-align: center; margin-bottom: 20px; font-weight: 500; }
    .share-options { display: flex; justify-content: center; gap: 24px; }
    .share-option { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
    .share-icon { width: 48px; height: 48px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .share-label { font-size: 11px; color: var(--secondary); font-family: 'Noto Serif JP', serif; }
    .share-cancel { margin-top: 20px; padding: 12px; text-align: center; color: var(--secondary); font-size: 14px; border-top: 1px solid var(--border); }
    .share-success { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--primary); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 100000; animation: fadeInOut 2s ease; }
    @keyframes fadeInOut { 0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } 20% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 80% { opacity: 1; } 100% { opacity: 0; } }
    
    /* 动效增强 */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes heartBeat { 0% { transform: scale(1); } 14% { transform: scale(1.3); } 28% { transform: scale(1); } 42% { transform: scale(1.3); } 70% { transform: scale(1); } }
    
    .fade-in { animation: fadeIn 0.5s ease; }
    .slide-in { animation: slideIn 0.4s ease; }
    
    /* 俳句卡片动画 */
    .haiku-card { animation: slideIn 0.4s ease; animation-fill-mode: both; }
    .haiku-card:nth-child(1) { animation-delay: 0.05s; }
    .haiku-card:nth-child(2) { animation-delay: 0.1s; }
    .haiku-card:nth-child(3) { animation-delay: 0.15s; }
    .haiku-card:nth-child(4) { animation-delay: 0.2s; }
    .haiku-card:nth-child(5) { animation-delay: 0.25s; }
    
    /* 交互动效 */
    .haiku-action { transition: all 0.2s ease; }
    .haiku-action:active { transform: scale(0.95); }
    .haiku-action.liked { animation: heartBeat 0.6s ease; color: var(--accent); }
    
    .tab-item { transition: all 0.2s ease; }
    
    /* 页面切换动画 */
    .page-enter { opacity: 0; transform: translateX(20px); }
    .page-enter-active { opacity: 1; transform: translateX(0); transition: opacity 0.3s ease, transform 0.3s ease; }
    .page-exit { opacity: 1; }
    .page-exit-active { opacity: 0; transition: opacity 0.2s ease; }
    .tab-item:active { transform: scale(0.95); }
    
    .kigo-pill { transition: all 0.2s ease; }
    .kigo-pill:active { transform: scale(0.95); background: var(--primary); color: white; }
    
    .menu-item { transition: all 0.2s ease; }
    .menu-item:active { background: var(--border); }
    
    .action-btn { transition: all 0.2s ease; }
    .action-btn:active { transform: scale(0.98); opacity: 0.9; }
    
    .haiku-user-follow { transition: all 0.2s ease; }
    .haiku-user-follow:active { transform: scale(0.95); }
    
    /* Share Button in Card */
    .haiku-share { font-size: 13px; color: var(--secondary); cursor: pointer; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    
    // 配置 - 部署后修改这里
    const API_BASE = 'https://seventeen-sounds-api.vercel.app/api'; // 生产环境
    
    const USER_KEY = '@seventeen_user';
    const HAIKU_STORAGE_KEY = '@seventeen_haikus';
    const LIKES_KEY = '@seventeen_likes';
    
    const loadUser = () => { try { return JSON.parse(localStorage.getItem(USER_KEY)); } catch (e) { return null; } };
    const saveUser = (user) => localStorage.setItem(USER_KEY, JSON.stringify(user));
    const clearUser = () => localStorage.removeItem(USER_KEY);
    
    const loadHaikus = () => { try { return JSON.parse(localStorage.getItem(HAIKU_STORAGE_KEY)) || []; } catch (e) { return []; } };
    const saveHaikus = (haikus) => localStorage.setItem(HAIKU_STORAGE_KEY, JSON.stringify(haikus));
    
    const loadLikes = () => { try { return JSON.parse(localStorage.getItem(LIKES_KEY)) || {}; } catch (e) { return {}; } };
    const saveLikes = (likes) => localStorage.setItem(LIKES_KEY, JSON.stringify(likes));
    
    const FOLLOWS_KEY = '@seventeen_follows';
    const loadFollows = () => { try { return JSON.parse(localStorage.getItem(FOLLOWS_KEY)) || { following: [], followers: [] }; } catch (e) { return { following: [], followers: [] }; } };
    const saveFollows = (follows) => localStorage.setItem(FOLLOWS_KEY, JSON.stringify(follows));
    
    // API 调用
    const api = {
      async createUser(name, email) {
        try {
          const res = await fetch(`${API_BASE}/user`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email })
          });
          return await res.json();
        } catch (e) {
          // 降级到本地存储
          const user = { id: `local_${Date.now()}`, name, email, points: 100, createdAt: new Date().toISOString() };
          saveUser(user);
          return { user };
        }
      },
      async getUser(userId) {
        try {
          const res = await fetch(`${API_BASE}/user?userId=${userId}`);
          return await res.json();
        } catch (e) {
          return { user: loadUser() };
        }
      },
      async createHaiku(userId, lines, season, author) {
        try {
          const res = await fetch(`${API_BASE}/haiku`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, lines, season, author })
          });
          return await res.json();
        } catch (e) {
          // 降级到本地存储
          const haiku = { id: `local_${Date.now()}`, userId, lines, season, author, likes: 0, createdAt: new Date().toISOString() };
          const haikus = [haiku, ...loadHaikus()];
          saveHaikus(haikus);
          return { haiku };
        }
      },
      async getPoints(userId) {
        try {
          const res = await fetch(`${API_BASE}/points?userId=${userId}`);
          const data = await res.json();
          return data.points || 0;
        } catch (e) {
          const user = loadUser();
          return user?.points || 0;
        }
      },
      async consumePoints(userId, amount) {
        try {
          const res = await fetch(`${API_BASE}/points`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ userId, amount, type: 'consume' })
          });
          return await res.json();
        } catch (e) {
          const user = loadUser();
          if (user && user.points >= amount) {
            user.points -= amount;
            saveUser(user);
            return { points: user.points };
          }
          return { error: 'Insufficient points' };
        }
      }
    };
    
    // Data
    const kigoData = {
      spring: ['春', '桜', '菜の花', '牡丹', '燕'],

          setPulling(true);
        }

      const handleTouchMove = (e) => {

          return;

        const deltaY = e.changedTouches[0].clientY - startY.current;
        if (deltaY > 60) {

        }
        setPulling(false);

      const filteredHaikus = searchQuery

      // 不同tab显示不同数据
      const getHaikusByTab = (tabType) => {
        switch(tabType) {
          case 'trending':
            // 趋势：按点赞数排序
            return [...sampleHaikus].sort((a, b) => b.likes - a.likes);
          case 'new':
            // 新品：按时间排序
            return [...sampleHaikus].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
          case 'classic':
            // フォロー中：经典俳句
            return sampleHaikus.filter(h => ['芭蕉', '子規', '蕪村', '一茶'].includes(h.author));
          default:
            return sampleHaikus;
        }
      };
      
      // Tab切换时刷新内容
      useEffect(() => {
        setLoading(true);
        // 模拟加载延迟
        const timer = setTimeout(() => {
          setDisplayHaikus(getHaikusByTab(tab));
          setLoading(false);

        setRefreshing(true);

        const shuffled = [...getHaikusByTab(tab)].sort(() => Math.random() - 0.5);

    // Timeline Screen

      const [refreshing, setRefreshing] = useState(false);
      const grouped = haikus.reduce((acc, h) => {
        const d = new Date(h.createdAt);
        const key = `${d.getFullYear()}.${d.getMonth() + 1}`;
        if (!acc[key]) acc[key] = [];
        acc[key].push(h);
        return acc;
      }, {});
      
      const sortedKeys = Object.keys(grouped).sort((a,b) => {
        const [yA,mA]=a.split('.').map(Number); const [yB,mB]=b.split('.').map(Number);
        return (yB*12+mB)-(yA*12+mA);
      });
      
      // 下拉刷新 - 重新加载数据
      const handleRefresh = async () => {
        setRefreshing(true);
        await new Promise(resolve => setTimeout(resolve, 500));
        setRefreshing(false);
      };

            <div className="menu-item" onClick={() => showToast ? showToast('プライバシーポリシーは準備中です') : alert('プライバシーは準備中です')}><span>プライバシー</span><span className="menu-item-arrow">›</span></div>
            <div className="menu-item" onClick={() => showToast ? showToast('ヘルプは準備中です') : alert('ヘルプは準備中です')}><span>ヘルプ</span><span className="menu-item-arrow">›</span></div>
            <div style={{borderBottom:'1px solid var(--border)',margin:'16px 0'}}></div>
            <div style={{fontSize:'12px',color:'var(--secondary)',marginBottom:'8px'}}>管理者機能</div>
            <div className="menu-item" onClick={() => showToast('管理画面は準備中です')}><span>ユーザー管理</span><span className="menu-item-arrow">›</span></div>
            <div className="menu-item" onClick={() => showToast('API設定は準備中です')}><span>API設定</span><span className="menu-item-arrow">›</span></div>
            <div className="menu-item" onClick={() => showToast('データ分析は準備中です')}><span>データ分析</span><span className="menu-item-arrow">›</span></div>
            <div className="menu-item" onClick={() => showToast ? showToast('利用規約は準備中です') : alert('利用規約は準備中です')}><span>利用規約</span><span className="menu-item-arrow">›</span></div>
            <div className="menu-item" onClick={() => showToast ? showToast('プライバシーポリシーは準備中です') : alert('プライバシーは準備中です')}><span>プライバシーポリシー</span><span className="menu-item-arrow">›</span></div>
            <div className="menu-item menu-item-danger" onClick={onLogout}>ログアウト</div>
          </div>
        </div>
      );
    };
    
    const AboutScreen = ({ onBack }) => (
      <div className="tab-content">
        
          <div className="header-title" style={{cursor:'pointer'}} onClick={onBack}>← 戻る</div>
          <div className="header-large-title">このアプリについて</div>
        </div>
        <div className="content" style={{textAlign:'center',padding:'40px 20px'}}>
          <div style={{fontFamily:'Noto Serif JP,serif',fontSize:'32px',marginBottom:'20px'}}>十七音</div>
          <div style={{color:'var(--secondary)',marginBottom:'40px'}}>Haiku for your journey</div>
          <div style={{fontSize:'14px',color:'var(--secondary)',lineHeight:'2'}}>
            <div>バージョン 1.0.0</div>
            <div>© 2026 十七音</div>
          </div>
          <div style={{marginTop:'40px',fontSize:'13px',color:'var(--secondary)'}}>
            俳句は、日本古来の短詩形文学です。<br/>
            五・七・五、十七音で自然の美しさを詠みます。
          </div>
        </div>
      </div>
    );
    
    // 关注列表页面
    const FollowsScreen = ({ follows, onBack }) => {
      const following = follows.following || [];
      return (
        <div className="tab-content">
          
            <div className="header-title" style={{cursor:'pointer'}} onClick={onBack}>← 戻る</div>
            <div className="header-large-title">フォロー</div>
          </div>
          <div className="content">
            {following.length === 0 ? (
              <div className="empty-state"><div className="empty-icon">–</div><div className="empty-text">まだフォローしていません</div></div>
            ) : following.map((name, i) => (
              <div key={i} className="menu-item" style={{padding:'12px 0'}}>
                <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                  <div style={{width:'40px',height:'40px',borderRadius:'50%',background:'var(--border)',display:'flex',alignItems:'center',justifyContent:'center'}}>{name[0]}</div>
                  <div style={{fontSize:'14px'}}>{name}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };
    
    // 粉丝列表页面
    const FollowersScreen = ({ follows, onBack }) => {
      const followers = follows.followers || [];
      return (
        <div className="tab-content">
          
            <div className="header-title" style={{cursor:'pointer'}} onClick={onBack}>← 戻る</div>
            <div className="header-large-title">フォロワー</div>
          </div>
          <div className="content">
            {followers.length === 0 ? (
              <div className="empty-state"><div className="empty-icon">–</div><div className="empty-text">まだフォロワーがいません</div></div>
            ) : followers.map((name, i) => (
              <div key={i} className="menu-item" style={{padding:'12px 0'}}>
                <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
                  <div style={{width:'40px',height:'40px',borderRadius:'50%',background:'var(--border)',display:'flex',alignItems:'center',justifyContent:'center'}}>{name[0]}</div>
                  <div style={{fontSize:'14px'}}>{name}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };
    
    // 用户主页
    const UserProfileScreen = ({ userName, onBack, onFollow, follows, currentUser }) => {
      const isFollowing = follows?.following?.includes(userName);
      // 模拟用户数据
      const userHaikus = [
        {id:1, lines:['古池や','蛙飛び込む','水の音'], season:'春', likes:128, author:userName},
        {id:2, lines:['夏草や','兵どもが','夢の跡'], season:'夏', likes:89, author:userName},
      ];
      
      return (
        <div className="tab-content">
          
            <div className="header-title" style={{cursor:'pointer'}} onClick={onBack}>← 戻る</div>
            <div className="header-large-title">{userName}</div>
          </div>
          <div className="content">
            <div className="profile-header">
              <div className="profile-avatar">{userName[0]}</div>
              <div className="profile-name">{userName}</div>
              <div style={{marginTop:'16px'}}>
                <button className={`action-btn ${isFollowing ? 'action-btn-secondary' : ''}`} onClick={() => onFollow(userName)} style={{width:'auto',padding:'12px 32px'}}>
                  {isFollowing ? '✓ フォロー中' : '+ フォロー'}
                </button>
              </div>
              <div className="profile-stats" style={{marginTop:'16px'}}>
                <div className="profile-stat"><div className="profile-stat-num">{userHaikus.length}</div><div className="profile-stat-label">俳句</div></div>
                <div className="profile-stat"><div className="profile-stat-num">0</div><div className="profile-stat-label">フォロワー</div></div>
                <div className="profile-stat"><div className="profile-stat-num">0</div><div className="profile-stat-label">フォロー</div></div>
              </div>
            </div>
            {userHaikus.map(item => (
              <div key={item.id} className="haiku-card">
                <div className="haiku-season">{item.season}</div>
                <div className="haiku-lines">{item.lines[0]}<br/>{item.lines[1]}<br/>{item.lines[2]}</div>
                <div className="haiku-author">— {item.author}</div>
                <div className="haiku-actions">
                  <div className="haiku-action">♡ {item.likes}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      );
    };
    
    // Main App
    const App = () => {
      const [showSplash, setShowSplash] = useState(true);
      const [isLoggedIn, setIsLoggedIn] = useState(!!loadUser());
      const [user, setUser] = useState(loadUser());
      const [activeTab, setActiveTab] = useState('discover');
      const [prevTab, setPrevTab] = useState('discover');
      const [tabAnimating, setTabAnimating] = useState(false);
      const [haikus, setHaikus] = useState([]);
      const [likes, setLikes] = useState(loadLikes());
      const [follows, setFollows] = useState(loadFollows());
      const [points, setPoints] = useState(0);
      const [comments, setComments] = useState({});
      // Toast 状态
      const [toasts, setToasts] = useState([]);
      
      const showToast = (message, duration = 2000) => {
        const id = Date.now();
        setToasts(prev => [...prev, { id, message, duration }]);
        setTimeout(() => {
          setToasts(prev => prev.filter(t => t.id !== id));
        }, duration + 600);
      };
      
      // Tab 切换动画
      const handleTabChange = (newTab) => {
        if (newTab === activeTab || tabAnimating) return;
        setPrevTab(activeTab);
        setTabAnimating(true);
        setTimeout(() => {
          setActiveTab(newTab);
          setTimeout(() => setTabAnimating(false), 50);
        }, 150);
      };
      
      useEffect(() => { 
        if (isLoggedIn) {
          setHaikus(loadHaikus());
          loadPoints();
        }
      }, [isLoggedIn]);
      
      const loadPoints = async () => {
        const p = await api.getPoints(user?.id);
        setPoints(p || user?.points || 0);
      };
      
      const handleLogin = (userData) => {
        setUser(userData);
        saveUser(userData);
        setIsLoggedIn(true);
        setPoints(userData.points || 100);
      };
      
      const handleLogout = () => {
        clearUser();
        setUser(null);
        setIsLoggedIn(false);
      };
      
      const handleHaikuCreated = (haiku) => {
        const newHaikus = [haiku, ...haikus];
        setHaikus(newHaikus);
        saveHaikus(newHaikus);
        setPoints(p => p - 10); // 扣除点数
        setActiveTab('timeline');
      };
      
      const handleLike = (id) => {
        const newLikes = { ...likes, [id]: !likes[id] };
        setLikes(newLikes);
        saveLikes(newLikes);
      };
      
      const handleFollow = (authorName) => {
        const newFollows = { ...follows };
        const idx = newFollows.following.indexOf(authorName);
        if (idx > -1) {
          newFollows.following.splice(idx, 1);
        } else {
          newFollows.following.push(authorName);
        }
        setFollows(newFollows);
        saveFollows(newFollows);
      };
      
      const handleComment = (haikuId, text) => {
        const newComments = { ...comments };
        if (!newComments[haikuId]) newComments[haikuId] = [];
        newComments[haikuId].push({
          user: user?.name || 'onymous',
          text: text,
          time: '今'
        });
        setComments(newComments);
        // 保存到localStorage
        localStorage.setItem('@seventeen_comments', JSON.stringify(newComments));
      };
      
      // 加载评论
      useEffect(() => {
        try {
          const saved = JSON.parse(localStorage.getItem('@seventeen_comments'));
          if (saved) setComments(saved);
        } catch(e) {}
      }, []);
      
      // 监听点数更新事件
      useEffect(() => {
        const handlePointsUpdate = (e) => {
          setPoints(e.detail.points);
        };
        window.addEventListener('pointsUpdated', handlePointsUpdate);
        return () => window.removeEventListener('pointsUpdated', handlePointsUpdate);
      }, []);
      
      // Data export function
      const handleExport = () => {
        const data = {
          user: user,
          haikus: haikus,
          likes: likes,
          follows: follows,
          comments: comments,
          exportedAt: new Date().toISOString(),
          version: '1.0.0'
        };
        
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `十七音データ_${new Date().toISOString().split('T')[0]}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showToast('データをエクスポートしました');
      };
      
      // Data import function
      const handleImport = (file) => {
        const reader = new FileReader();
        reader.onload = (e) => {
          try {
            const data = JSON.parse(e.target.result);
            
            // Validate import data
            if (!data.haikus || !Array.isArray(data.haikus)) {
              showToast('無効なデータ形式です');
              return;
            }
            
            // Restore data
            if (data.haikus) {
              setHaikus(data.haikus);
              saveHaikus(data.haikus);
            }
            if (data.likes) {
              setLikes(data.likes);
              saveLikes(data.likes);
            }
            if (data.follows) {
              setFollows(data.follows);
              saveFollows(data.follows);
            }
            if (data.comments) {
              setComments(data.comments);
              localStorage.setItem('@seventeen_comments', JSON.stringify(data.comments));
            }
            
            showToast('データをインポートしました');
          } catch (err) {
            showToast('データの読み込みに失敗しました', 3000);
            console.error(err);
          }
        };
        reader.readAsText(file);
      };
      const [profileSubPage, setProfileSubPage] = useState(null);
      const [viewingUser, setViewingUser] = useState(null);
      
      const handleViewProfile = (userName) => {
        if (userName && userName !== user?.name) {
          setViewingUser(userName);
        }
      };
      
      const handleBackFromUser = () => {
        setViewingUser(null);
      };
      
      const handleMenuClick = (page) => {
        setProfileSubPage(page);
      };
      
      const handleBack = () => {
        setProfileSubPage(null);
      };
      
      const handlePurchase = (pt) => {
        const newPoints = points + pt;
        setPoints(newPoints);
        const updatedUser = { ...user, points: newPoints };
        setUser(updatedUser);
        saveUser(updatedUser);
        showToast(`${pt}ポイントを購入しました！`);
      };
      
      if (showSplash) return <Splash onFinish={() => setShowSplash(false)} />;
      if (!isLoggedIn) return <LoginScreen onLogin={handleLogin} />;
      
      // 渲染profile子页面
      if (viewingUser) return <UserProfileScreen userName={viewingUser} onBack={handleBackFromUser} onFollow={handleFollow} follows={follows} currentUser={user} />;
      
      if (profileSubPage === 'myHaiku') return <MyHaikuScreen user={user} haikus={haikus} likes={likes} onBack={handleBack} comments={comments} onComment={handleComment} follows={follows} onFollow={handleFollow} />;
      if (profileSubPage === 'likedHaiku') return <LikedHaikuScreen sampleHaikus={sampleHaikus} likes={likes} onBack={handleBack} comments={comments} onComment={handleComment} follows={follows} onFollow={handleFollow} />;
      if (profileSubPage === 'follows') return <FollowsScreen follows={follows} onBack={handleBack} />;
      if (profileSubPage === 'followers') return <FollowersScreen follows={follows} onBack={handleBack} />;
      if (profileSubPage === 'purchase') return <PurchaseScreen points={points} onBack={handleBack} onPurchase={handlePurchase} />;
      if (profileSubPage === 'settings') return <SettingsScreen user={user} onBack={handleBack} onLogout={handleLogout} onExport={handleExport} onImport={handleImport} showToast={showToast} />;
      if (profileSubPage === 'about') return <AboutScreen onBack={handleBack} />;
      
      return (
        <div className="app">
          {/* Toast 提示 */}
          {toasts.map(toast => (
            <div key={toast.id} className="toast-item">{toast.message}</div>
          ))}
          
          <div className="page-content" style={{animation: 'slideIn 0.3s ease'}}>
            {activeTab === 'create' && <CreateScreen user={user} points={points} onHaikuCreated={handleHaikuCreated} follows={follows} />}
            {activeTab === 'discover' && <DiscoverScreen likes={likes} onLike={handleLike} comments={comments} onComment={handleComment} user={user} follows={follows} onFollow={handleFollow} onViewProfile={handleViewProfile} />}
            {activeTab === 'timeline' && <TimelineScreen haikus={haikus} likes={likes} onLike={handleLike} comments={comments} onComment={handleComment} follows={follows} onFollow={handleFollow} currentUser={user} onViewProfile={handleViewProfile} />}
            {activeTab === 'profile' && <ProfileScreen user={user} haikuCount={haikus.length} onLogout={handleLogout} likes={likes} points={points} allHaikus={haikus} onMenuClick={handleMenuClick} follows={follows} />}
          </div>
          
          <div className="tab-bar">
            {[{key:'create',label:'創作'},{key:'discover',label:'発見'},{key:'timeline',label:'吟行'},{key:'profile',label:'自分'}].map(item => (
              <div key={item.key} className={`tab-item ${activeTab === item.key ? 'active' : ''}`} onClick={() => handleTabChange(item.key)}>
                <span className="tab-icon">{Icons[item.key]}</span>
                <span className="tab-label">{item.label}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
